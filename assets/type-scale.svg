<svg xmlns="http://www.w3.org/2000/svg" width="800" height="460" viewBox="0 0 800 460">
  <rect width="800" height="460" fill="#f9f9f9" rx="12"/>

  <!-- Header -->
  <text x="24" y="28" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#a3a3a3" letter-spacing="1.5">TYPE SCALE — INTER · FLUID WITH CLAMP()</text>
  <line x1="24" y1="38" x2="776" y2="38" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Column headers -->
  <text x="24"  y="56" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#d4d4d4" letter-spacing="1">TOKEN</text>
  <text x="150" y="56" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#d4d4d4" letter-spacing="1">SAMPLE</text>

  <!-- Row dividers -->
  <line x1="24" y1="64"  x2="776" y2="64"  stroke="#e5e5e5" stroke-width="1"/>
  <line x1="24" y1="148" x2="776" y2="148" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="24" y1="210" x2="776" y2="210" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="24" y1="258" x2="776" y2="258" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="24" y1="300" x2="776" y2="300" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="24" y1="338" x2="776" y2="338" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="24" y1="372" x2="776" y2="372" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="24" y1="404" x2="776" y2="404" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="24" y1="432" x2="776" y2="432" stroke="#e5e5e5" stroke-width="1"/>

  <!-- 5xl — 72px max -->
  <text x="24"  y="118" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">--text-5xl</text>
  <text x="24"  y="128" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#d4d4d4">48–72px</text>
  <text x="150" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="60" font-weight="800" fill="#171717" textLength="626" lengthAdjust="spacingAndGlyphs">Display</text>

  <!-- 4xl — 48px max -->
  <text x="24"  y="174" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">--text-4xl</text>
  <text x="24"  y="186" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#d4d4d4">36–48px</text>
  <text x="150" y="198" font-family="system-ui,-apple-system,sans-serif" font-size="44" font-weight="800" fill="#171717">Heading one</text>

  <!-- 3xl — 30px max -->
  <text x="24"  y="228" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">--text-3xl</text>
  <text x="24"  y="240" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#d4d4d4">28–30px</text>
  <text x="150" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="30" font-weight="700" fill="#171717">Section heading</text>

  <!-- 2xl — 24px max -->
  <text x="24"  y="270" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">--text-2xl</text>
  <text x="24"  y="282" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#d4d4d4">22–24px</text>
  <text x="150" y="292" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700" fill="#171717">Subheading text</text>

  <!-- xl — 20px max -->
  <text x="24"  y="310" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">--text-xl</text>
  <text x="24"  y="322" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#d4d4d4">19–20px</text>
  <text x="150" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="600" fill="#171717">Large body or intro paragraph</text>

  <!-- lg — 18px max -->
  <text x="24"  y="348" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">--text-lg</text>
  <text x="24"  y="360" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#d4d4d4">17–18px</text>
  <text x="150" y="366" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#171717">Body large — readable long-form content</text>

  <!-- base — 16px max -->
  <text x="24"  y="382" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">--text-base</text>
  <text x="24"  y="394" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#d4d4d4">15–16px</text>
  <text x="150" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#262626">Default body — the foundation of all readable text</text>

  <!-- sm — 14px max -->
  <text x="24"  y="414" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">--text-sm</text>
  <text x="24"  y="424" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#d4d4d4">13–14px</text>
  <text x="150" y="428" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#525252">Small text — captions, helper text, secondary labels</text>

  <!-- xs — 12px max -->
  <text x="24"  y="442" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#a3a3a3">--text-xs</text>
  <text x="150" y="450" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#737373">Extra small — overlines, tags, legal copy, timestamps</text>
</svg>
