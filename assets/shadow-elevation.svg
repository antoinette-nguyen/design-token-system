<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow-md" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4"  stdDeviation="6"   flood-color="#000" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2"  stdDeviation="2"   flood-color="#000" flood-opacity="0.04"/>
    </filter>
    <filter id="shadow-lg" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8"  stdDeviation="12"  flood-color="#000" flood-opacity="0.10"/>
      <feDropShadow dx="0" dy="4"  stdDeviation="4"   flood-color="#000" flood-opacity="0.04"/>
    </filter>
    <filter id="shadow-xl" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="20" stdDeviation="24"  flood-color="#000" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="8"  stdDeviation="8"   flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="800" height="200" fill="#e5e5e5" rx="12"/>

  <text x="24" y="24" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#737373" letter-spacing="1.5">SHADOW — ELEVATION SCALE</text>

  <!-- sm -->
  <rect x="60"  y="50" width="120" height="100" rx="10" fill="#ffffff" filter="url(#shadow-sm)"/>
  <text x="120" y="167" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#525252">--shadow-sm</text>
  <text x="120" y="180" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9"  fill="#a3a3a3">ground level</text>

  <!-- md -->
  <rect x="230" y="46" width="120" height="100" rx="10" fill="#ffffff" filter="url(#shadow-md)"/>
  <text x="290" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#525252">--shadow-md</text>
  <text x="290" y="176" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9"  fill="#a3a3a3">cards, panels</text>

  <!-- lg -->
  <rect x="400" y="40" width="120" height="100" rx="10" fill="#ffffff" filter="url(#shadow-lg)"/>
  <text x="460" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#525252">--shadow-lg</text>
  <text x="460" y="173" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9"  fill="#a3a3a3">dropdowns, popovers</text>

  <!-- xl -->
  <rect x="570" y="32" width="120" height="100" rx="10" fill="#ffffff" filter="url(#shadow-xl)"/>
  <text x="630" y="152" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#525252">--shadow-xl</text>
  <text x="630" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9"  fill="#a3a3a3">modals, dialogs</text>
</svg>
