<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#f9f9f9" rx="12"/>

  <text x="24" y="24" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#a3a3a3" letter-spacing="1.5">SPACING — BEFORE / AFTER TOKENS</text>
  <line x1="24" y1="32" x2="776" y2="32" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Divider between panels -->
  <line x1="400" y1="36" x2="400" y2="292" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ───── LEFT PANEL: Without tokens ───── -->
  <text x="80" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#ef4444">✗ Without tokens</text>
  <text x="80" y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#a3a3a3">hardcoded, inconsistent</text>

  <!-- Card outline -->
  <rect x="36" y="82" width="328" height="192" rx="10" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Card header — wrong padding 11px -->
  <rect x="36" y="82" width="328" height="44" rx="10" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="36" y="108" width="328" height="18" rx="0" fill="#fafafa"/>
  <text x="58" y="110" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#262626">Project card</text>
  <!-- Padding annotation: 11px (wrong) -->
  <line x1="47" y1="83" x2="47" y2="93" stroke="#ef4444" stroke-width="1"/>
  <line x1="47" y1="83" x2="57" y2="83" stroke="#ef4444" stroke-width="1"/>
  <line x1="47" y1="93" x2="57" y2="93" stroke="#ef4444" stroke-width="1"/>
  <text x="60" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#ef4444">11px</text>

  <!-- Body: wrong padding 22px left, 7px top -->
  <text x="58" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#737373">A design case study showcasing</text>
  <text x="58" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#737373">UX research and prototyping.</text>

  <!-- Tag: wrong margin -->
  <rect x="58" y="178" width="48" height="18" rx="4" fill="#f0f0f0"/>
  <text x="82" y="191" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#525252">UI/UX</text>
  <rect x="114" y="178" width="52" height="18" rx="4" fill="#f0f0f0"/>
  <text x="140" y="191" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#525252">Figma</text>

  <!-- Button: wrong padding -->
  <rect x="58" y="218" width="90" height="32" rx="6" fill="#7c3aed"/>
  <text x="103" y="238" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fff">View case</text>

  <!-- Annotations -->
  <text x="220" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#ef4444">margin-top: 7px</text>
  <text x="220" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#ef4444">padding: 9px 13px</text>
  <text x="220" y="182" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#ef4444">gap: 5px</text>

  <!-- ───── RIGHT PANEL: With tokens ───── -->
  <text x="680" y="58" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#22c55e">✓ With tokens</text>
  <text x="680" y="70" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#a3a3a3">consistent, intentional</text>

  <!-- Card outline -->
  <rect x="436" y="82" width="328" height="192" rx="10" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Card header — correct 16px (space-4) padding -->
  <rect x="436" y="82" width="328" height="48" rx="10" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="436" y="112" width="328" height="18" rx="0" fill="#fafafa"/>
  <text x="452" y="113" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#262626">Project card</text>
  <!-- Padding annotation: space-4 = 16px -->
  <line x1="437" y1="83" x2="437" y2="99" stroke="#22c55e" stroke-width="1"/>
  <line x1="437" y1="83" x2="447" y2="83" stroke="#22c55e" stroke-width="1"/>
  <line x1="437" y1="99" x2="447" y2="99" stroke="#22c55e" stroke-width="1"/>
  <text x="450" y="92" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#22c55e">--space-4</text>

  <!-- Body: correct 16px padding, 12px top -->
  <text x="452" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#737373">A design case study showcasing</text>
  <text x="452" y="164" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#737373">UX research and prototyping.</text>

  <!-- Tags: correct gap -->
  <rect x="452" y="180" width="48" height="20" rx="4" fill="#f5f3ff"/>
  <text x="476" y="194" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#7c3aed">UI/UX</text>
  <rect x="508" y="180" width="52" height="20" rx="4" fill="#f5f3ff"/>
  <text x="534" y="194" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="600" fill="#7c3aed">Figma</text>

  <!-- Button: correct padding -->
  <rect x="452" y="218" width="104" height="36" rx="8" fill="#7c3aed"/>
  <text x="504" y="241" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fff">View case</text>

  <!-- Annotations -->
  <text x="614" y="152" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#22c55e">--space-3</text>
  <text x="614" y="222" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#22c55e">--space-3 --space-6</text>
  <text x="614" y="184" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#22c55e">--space-2</text>
</svg>
