<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260">
  <rect width="800" height="260" fill="#f9f9f9" rx="12"/>

  <text x="24" y="24" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#a3a3a3" letter-spacing="1.5">TOKEN IN USE — CSS → RENDERED COMPONENT</text>
  <line x1="24" y1="32" x2="776" y2="32" stroke="#e5e5e5" stroke-width="1"/>

  <!-- ── LEFT: Code panel ── -->
  <rect x="24" y="44" width="400" height="200" rx="10" fill="#171717"/>

  <!-- Code header bar -->
  <rect x="24" y="44" width="400" height="32" rx="10" fill="#262626"/>
  <rect x="24" y="60" width="400" height="16" fill="#262626"/>
  <circle cx="44" cy="60" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="60" cy="60" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="76" cy="60" r="5" fill="#22c55e" opacity="0.7"/>
  <text x="200" y="63" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#525252">card.css</text>

  <!-- Code lines -->
  <text x="44" y="96"  font-family="monospace" font-size="11" fill="#a78bfa">.card</text>
  <text x="79" y="96"  font-family="monospace" font-size="11" fill="#f9f9f9"> {</text>

  <text x="56" y="114" font-family="monospace" font-size="11" fill="#737373">background</text>
  <text x="137" y="114" font-family="monospace" font-size="11" fill="#f9f9f9">:</text>
  <text x="145" y="114" font-family="monospace" font-size="11" fill="#86efac">var</text>
  <text x="168" y="114" font-family="monospace" font-size="11" fill="#f9f9f9">(</text>
  <text x="175" y="114" font-family="monospace" font-size="11" fill="#c4b5fd">--color-surface</text>
  <text x="296" y="114" font-family="monospace" font-size="11" fill="#f9f9f9">);</text>

  <text x="56" y="132" font-family="monospace" font-size="11" fill="#737373">border-radius</text>
  <text x="163" y="132" font-family="monospace" font-size="11" fill="#f9f9f9">:</text>
  <text x="171" y="132" font-family="monospace" font-size="11" fill="#86efac">var</text>
  <text x="194" y="132" font-family="monospace" font-size="11" fill="#f9f9f9">(</text>
  <text x="201" y="132" font-family="monospace" font-size="11" fill="#c4b5fd">--radius-lg</text>
  <text x="290" y="132" font-family="monospace" font-size="11" fill="#f9f9f9">);</text>

  <text x="56" y="150" font-family="monospace" font-size="11" fill="#737373">padding</text>
  <text x="111" y="150" font-family="monospace" font-size="11" fill="#f9f9f9">:</text>
  <text x="119" y="150" font-family="monospace" font-size="11" fill="#86efac">var</text>
  <text x="142" y="150" font-family="monospace" font-size="11" fill="#f9f9f9">(</text>
  <text x="149" y="150" font-family="monospace" font-size="11" fill="#c4b5fd">--space-6</text>
  <text x="224" y="150" font-family="monospace" font-size="11" fill="#f9f9f9">);</text>

  <text x="56" y="168" font-family="monospace" font-size="11" fill="#737373">box-shadow</text>
  <text x="141" y="168" font-family="monospace" font-size="11" fill="#f9f9f9">:</text>
  <text x="149" y="168" font-family="monospace" font-size="11" fill="#86efac">var</text>
  <text x="172" y="168" font-family="monospace" font-size="11" fill="#f9f9f9">(</text>
  <text x="179" y="168" font-family="monospace" font-size="11" fill="#c4b5fd">--shadow-md</text>
  <text x="268" y="168" font-family="monospace" font-size="11" fill="#f9f9f9">);</text>

  <text x="56" y="186" font-family="monospace" font-size="11" fill="#737373">transition</text>
  <text x="130" y="186" font-family="monospace" font-size="11" fill="#f9f9f9">:</text>
  <text x="138" y="186" font-family="monospace" font-size="11" fill="#86efac">var</text>
  <text x="161" y="186" font-family="monospace" font-size="11" fill="#f9f9f9">(</text>
  <text x="168" y="186" font-family="monospace" font-size="11" fill="#c4b5fd">--duration-base</text>
  <text x="291" y="186" font-family="monospace" font-size="11" fill="#f9f9f9">)</text>

  <text x="56" y="200" font-family="monospace" font-size="11" fill="#c4b5fd">               --ease-out</text>
  <text x="246" y="200" font-family="monospace" font-size="11" fill="#f9f9f9">);</text>

  <text x="44" y="218" font-family="monospace" font-size="11" fill="#f9f9f9">}</text>

  <!-- Arrow -->
  <text x="412" y="136" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#d4d4d4">→</text>

  <!-- ── RIGHT: Rendered card ── -->
  <rect x="436" y="44" width="340" height="200" rx="10" fill="#e5e5e5"/>

  <!-- The rendered card with shadow -->
  <filter id="card-shadow">
    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.04"/>
  </filter>
  <rect x="490" y="72" width="228" height="144" rx="12" fill="#ffffff" filter="url(#card-shadow)"/>

  <!-- Card contents -->
  <text x="506" y="101" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="700" fill="#a78bfa" letter-spacing="0.08em">CASE STUDY</text>
  <text x="506" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="800" fill="#171717">Onboarding redesign</text>
  <text x="506" y="138" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#737373">Reduced drop-off by 34%</text>
  <text x="506" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#737373">through a redesigned flow.</text>

  <rect x="506" y="162" width="44" height="18" rx="4" fill="#f5f3ff"/>
  <text x="528" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#7c3aed">UI/UX</text>
  <rect x="556" y="162" width="50" height="18" rx="4" fill="#f5f3ff"/>
  <text x="581" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="8" font-weight="600" fill="#7c3aed">Figma</text>

  <rect x="506" y="190" width="80" height="28" rx="8" fill="#7c3aed"/>
  <text x="546" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="600" fill="#fff">View case →</text>

  <!-- Resolved value labels -->
  <text x="724" y="90"  font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#a3a3a3">#ffffff</text>
  <text x="724" y="106" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#a3a3a3">12px</text>
  <text x="724" y="122" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#a3a3a3">24px</text>
  <text x="724" y="138" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#a3a3a3">shadow</text>
  <text x="724" y="154" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#a3a3a3">250ms</text>
</svg>
