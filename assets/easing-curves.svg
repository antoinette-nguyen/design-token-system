<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <rect width="800" height="200" fill="#f9f9f9" rx="12"/>

  <text x="24" y="24" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#a3a3a3" letter-spacing="1.5">MOTION — EASING CURVES</text>
  <line x1="24" y1="32" x2="776" y2="32" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Each curve box is 120x100, 5 of them across 800px -->
  <!-- x positions: 40, 200, 360, 520, 680 (centered in 5 equal columns of 160px) -->
  <!-- curve drawing area: 100x80 inside each box, padded 10px -->
  <!-- Start point: (10, 90) of local coords, End: (90, 10) -->

  <!-- ease-default: cubic-bezier(0.4, 0, 0.2, 1) -->
  <!-- CP1: (10+0.4*80, 90-0*80) = (42, 90) -->
  <!-- CP2: (10+0.2*80, 90-1*80) = (26, 10) -->
  <g transform="translate(40, 50)">
    <rect width="120" height="100" rx="8" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <!-- Grid lines -->
    <line x1="10" y1="90" x2="110" y2="90" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="10" y1="10" x2="110" y2="10" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="10" y1="10" x2="10"  y2="90" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="110" y1="10" x2="110" y2="90" stroke="#f0f0f0" stroke-width="1"/>
    <!-- Control point lines -->
    <line x1="10" y1="90" x2="42" y2="90" stroke="#ddd6fe" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="110" y1="10" x2="26" y2="10" stroke="#ddd6fe" stroke-width="1" stroke-dasharray="2,2"/>
    <!-- Curve -->
    <path d="M 10 90 C 42 90 26 10 110 10" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <!-- Dots -->
    <circle cx="10"  cy="90" r="3" fill="#7c3aed"/>
    <circle cx="110" cy="10" r="3" fill="#7c3aed"/>
  </g>
  <text x="100" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#525252">ease-default</text>
  <text x="100" y="177" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9"  fill="#a3a3a3">0.4, 0, 0.2, 1</text>

  <!-- ease-in: cubic-bezier(0.4, 0, 1, 1) -->
  <!-- CP1: (42, 90), CP2: (90+10, 90-80) = (110, 10) -->
  <g transform="translate(200, 50)">
    <rect width="120" height="100" rx="8" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <line x1="10" y1="90" x2="110" y2="90" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="10" y1="10" x2="110" y2="10" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="10" y1="10" x2="10"  y2="90" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="110" y1="10" x2="110" y2="90" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="10" y1="90" x2="42" y2="90" stroke="#ddd6fe" stroke-width="1" stroke-dasharray="2,2"/>
    <path d="M 10 90 C 42 90 110 10 110 10" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <circle cx="10"  cy="90" r="3" fill="#7c3aed"/>
    <circle cx="110" cy="10" r="3" fill="#7c3aed"/>
  </g>
  <text x="260" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#525252">ease-in</text>
  <text x="260" y="177" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9"  fill="#a3a3a3">0.4, 0, 1, 1</text>

  <!-- ease-out: cubic-bezier(0, 0, 0.2, 1) -->
  <!-- CP1: (10, 90), CP2: (26, 10) -->
  <g transform="translate(360, 50)">
    <rect width="120" height="100" rx="8" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <line x1="10" y1="90" x2="110" y2="90" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="10" y1="10" x2="110" y2="10" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="10" y1="10" x2="10"  y2="90" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="110" y1="10" x2="110" y2="90" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="110" y1="10" x2="26" y2="10" stroke="#ddd6fe" stroke-width="1" stroke-dasharray="2,2"/>
    <path d="M 10 90 C 10 90 26 10 110 10" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <circle cx="10"  cy="90" r="3" fill="#7c3aed"/>
    <circle cx="110" cy="10" r="3" fill="#7c3aed"/>
  </g>
  <text x="420" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#525252">ease-out</text>
  <text x="420" y="177" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9"  fill="#a3a3a3">0, 0, 0.2, 1</text>

  <!-- ease-in-out: cubic-bezier(0.4, 0, 0.2, 1) — same shape, labeled differently -->
  <g transform="translate(520, 50)">
    <rect width="120" height="100" rx="8" fill="#fff" stroke="#e5e5e5" stroke-width="1"/>
    <line x1="10" y1="90" x2="110" y2="90" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="10" y1="10" x2="110" y2="10" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="10" y1="10" x2="10"  y2="90" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="110" y1="10" x2="110" y2="90" stroke="#f0f0f0" stroke-width="1"/>
    <line x1="10" y1="90" x2="42" y2="90" stroke="#ddd6fe" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="110" y1="10" x2="26" y2="10" stroke="#ddd6fe" stroke-width="1" stroke-dasharray="2,2"/>
    <path d="M 10 90 C 42 90 26 10 110 10" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    <circle cx="10"  cy="90" r="3" fill="#7c3aed"/>
    <circle cx="110" cy="10" r="3" fill="#7c3aed"/>
  </g>
  <text x="580" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#525252">ease-in-out</text>
  <text x="580" y="177" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9"  fill="#a3a3a3">0.4, 0, 0.2, 1</text>

  <!-- ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1) — overshoots -->
  <!-- CP1: (10+0.34*100, 90-1.56*80) = (44, -35) -->
  <!-- CP2: (10+0.64*100, 90-1*80) = (74, 10) -->
  <g transform="translate(680, 50)">
    <rect width="120" height="100" rx="8" fill="#fff" stroke="#e5e5e5" stroke-width="1" clip-path="none"/>
    <clipPath id="spring-clip"><rect width="120" height="100" rx="8"/></clipPath>
    <g clip-path="url(#spring-clip)">
      <line x1="10" y1="90" x2="110" y2="90" stroke="#f0f0f0" stroke-width="1"/>
      <line x1="10" y1="10" x2="110" y2="10" stroke="#f0f0f0" stroke-width="1"/>
      <line x1="10" y1="10" x2="10"  y2="90" stroke="#f0f0f0" stroke-width="1"/>
      <line x1="110" y1="10" x2="110" y2="90" stroke="#f0f0f0" stroke-width="1"/>
      <!-- spring path overshoots above y=10 -->
      <path d="M 10 90 C 44 -35 74 10 110 10" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
    </g>
    <circle cx="10"  cy="90" r="3" fill="#7c3aed"/>
    <circle cx="110" cy="10" r="3" fill="#7c3aed"/>
  </g>
  <text x="740" y="165" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#525252">ease-spring</text>
  <text x="740" y="177" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="9"  fill="#a3a3a3">0.34, 1.56, 0.64, 1</text>
</svg>
